name: Test Flow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      # Allows manual runs against a custom deployed API endpoint.
      api_base_url:
        description: API base URL for smoke tests
        type: string
        default: https://fit5120-tm11.onrender.com

env:
  DEFAULT_API_BASE_URL: https://fit5120-tm11.onrender.com

jobs:
  whitebox:
    name: White-box Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend typecheck
        run: npx tsc --noEmit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install white-box test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r nutri-health-api/requirements.txt

      - name: Run white-box tests
        run: bash tests/whitebox/scripts/run_whitebox.sh

  api-test:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: whitebox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run API smoke tests
        env:
          # For push/PR use default endpoint; manual runs can override via input.
          API_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.api_base_url || env.DEFAULT_API_BASE_URL }}
          # Optional: when configured, smoke test includes token-based checks.
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
        run: bash tests/api-deploy/scripts/api_smoke_test.sh
