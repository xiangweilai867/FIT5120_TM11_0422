services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: nutrihealth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutrihealth
      POSTGRES_PASSWORD: nutrihealth_dev_password
      POSTGRES_DB: nutrihealth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrihealth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrihealth-api
    restart: unless-stopped
    # Load host `.env` into the container (OPENAI_API_KEY, SECRET_KEY, etc.)
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      # Default matches the `db` service above; override in `.env` if needed.
      DATABASE_URL: ${DATABASE_URL:-postgresql://nutrihealth:nutrihealth_dev_password@db:5432/nutrihealth}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_api_key_here}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      FOOD_VISION_PROVIDER: ${FOOD_VISION_PROVIDER:-qwen}
      QWEN_VL_MODEL: ${QWEN_VL_MODEL:-qwen3-vl-plus}
      QWEN_TEXT_MODEL: ${QWEN_TEXT_MODEL:-qwen-plus}
      QWEN_VL_STREAM: ${QWEN_VL_STREAM:-false}
      QWEN_VL_ENABLE_THINKING: ${QWEN_VL_ENABLE_THINKING:-false}
      QWEN_VL_THINKING_BUDGET: ${QWEN_VL_THINKING_BUDGET:-81920}
      CACHE_AI_RESPONSE: ${CACHE_AI_RESPONSE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081,http://localhost:19006}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload during development
      - ./app:/app/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local
