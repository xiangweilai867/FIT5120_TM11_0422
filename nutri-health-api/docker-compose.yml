version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: nutrihealth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutrihealth
      POSTGRES_PASSWORD: nutrihealth_dev_password
      POSTGRES_DB: nutrihealth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrihealth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrihealth-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nutrihealth:nutrihealth_dev_password@db:5432/nutrihealth
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_api_key_here}
      - CORS_ORIGINS=http://localhost:8081,http://localhost:19006,http://localhost:3000
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload during development
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local
